#### general settings
name: EFNet_default_2e-4
use_tb_logger: True
model: sr
distortion: sr
scale: 1
save_img: True
gpu_ids: [0]


#### network structures
network_G:
  which_model_G: EFNet
  in_nc: 3


#### datasets
datasets:
  train:
    name: EvInt
    mode: LQGT
    dataroot_GT: /data/queahren/Low_level_datasets/GOPRO/GOPRO_total/train/sharp
    dataroot_Event: /data/queahren/Low_level_datasets/GOPRO/GOPRO_total/train/H5/train_blur.h5
    dataroot_Frame: /data/queahren/Low_level_datasets/GOPRO/GOPRO_total/train/blur
    use_shuffle: true
    n_workers: 0  # per GPU
    batch_size: 16
    GT_size: 176
    use_flip: true
    use_rot: true
    color: RGB
    scale: 1
  val:
    name: EvInt_valid
    mode: LQGT
    dataroot_GT: /data/queahren/Low_level_datasets/GOPRO/GOPRO_total/test/sharp
    dataroot_Event: /data/queahren/Low_level_datasets/GOPRO/GOPRO_total/test/H5/test_blur.h5
    dataroot_Frame: /data/queahren/Low_level_datasets/GOPRO/GOPRO_total/test/blur
    scale: 1
  
#### path
path:
  pretrain_model_G: ~

  strict_load: true
  resume_state: ~
  root: /output/res

#### training settings: learning rate scheme, loss
train:
  lr_G: !!float 2e-4
  lr_scheme: CosineAnnealingLR_Restart
  beta1: 0.9
  beta2: 0.99
  niter: 150000
  warmup_iter: -1  # no warm up
  T_period: [150000, 250000, 250000, 250000]
  restarts: [150000, 500000, 750000]
  restart_weights: [1, 1, 1]
  eta_min: !!float 1e-7

  pixel_criterion: l1
  pixel_weight: 1.0

  manual_seed: 10
  val_freq: !!float 1.5e4
  # val_freq: 500

#### logger
logger:
  print_freq: 100
  # print_freq: 1
  save_checkpoint_freq: !!float 1.5e4