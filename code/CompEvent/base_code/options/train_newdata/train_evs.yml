#### general settings
name: EVSFormer_default_3e-4
use_tb_logger: True
model: sr
distortion: sr
scale: 1
save_img: True
gpu_ids: [0]


#### network structures
network_G:
  which_model_G: EVSFormer
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [4,6,6,8]
  num_refinement_blocks: 4
  heads: [1,2,4,8]
  ffn_expansion_factor: 2.66
  bias: False
  LayerNorm_type: WithBias
  dual_pixel_task: False


#### datasets
datasets:
  train:
    name: gopro-h5-train
    mode: H5ImageDataset
    dataroot: /data/queahren/Low_level_datasets/GOPRO/GOPRO_new/train
    norm_voxel: true
    return_voxel: true

    return_mask: false
    use_shuffle: true
    n_workers: 4  # per GPU
    batch_size: 6
    crop_size: 128

    use_flip: true
    use_rot: true

    color: RGB
    scale: 1
  val:
    name: gopro-h5-test
    mode: H5ImageDataset
    dataroot: /data/queahren/Low_level_datasets/GOPRO/GOPRO_new/test

    norm_voxel: true  
    return_voxel: true
    use_flip: false
    use_rot: false

    scale: 1
  
#### path
path:
  pretrain_model_G: ~

  strict_load: true
  resume_state: ~
  root: /output/res

#### training settings: learning rate scheme, loss
train:
  lr_G: !!float 2e-4
  lr_scheme: CosineAnnealingLR_Restart
  beta1: 0.9
  beta2: 0.99
  niter: 200000
  warmup_iter: -1  # no warm up
  T_period: [200000, 250000, 250000, 250000]
  restarts: [200000, 500000, 750000]
  restart_weights: [1, 1, 1]
  eta_min: !!float 1e-7

  pixel_criterion: l1
  pixel_weight: 1.0

  manual_seed: 10
  val_freq: !!float 4e4
  # val_freq: 500

#### logger
logger:
  print_freq: 100
  # print_freq: 1
  save_checkpoint_freq: !!float 4e4