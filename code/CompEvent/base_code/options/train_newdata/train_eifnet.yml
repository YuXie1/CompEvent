#### general settings
name: EIFNet_default_2e-4
use_tb_logger: True
model: sr
distortion: sr
scale: 1
save_img: True
gpu_ids: [0]


#### network structures
network_G:
  which_model_G: EIFNet
  # in_nc: 3


#### datasets
datasets:
  train:
    name: gopro-h5-train
    mode: H5ImageDataset
    dataroot: /data/queahren/Low_level_datasets/GOPRO/GOPRO_new/train
    norm_voxel: true
    return_voxel: true

    return_mask: false
    use_shuffle: true
    n_workers: 4  # per GPU
    batch_size: 16
    crop_size: 256

    use_flip: true
    use_rot: true

    color: RGB
    scale: 1
  val:
    name: gopro-h5-test
    mode: H5ImageDataset
    dataroot: /data/queahren/Low_level_datasets/GOPRO/GOPRO_new/test

    norm_voxel: true  
    return_voxel: true
    use_flip: false
    use_rot: false

    scale: 1
  
#### path
path:
  pretrain_model_G: ~

  strict_load: true
  resume_state: ~
  root: /output/res

#### training settings: learning rate scheme, loss
train:
  lr_G: !!float 2e-4
  lr_scheme: CosineAnnealingLR_Restart
  beta1: 0.9
  beta2: 0.99
  niter: 70000
  warmup_iter: -1  # no warm up
  T_period: [70000, 250000, 250000, 250000]
  restarts: [70000, 500000, 750000]
  restart_weights: [1, 1, 1]
  eta_min: !!float 1e-7

  pixel_criterion: l1
  pixel_weight: 1.0

  manual_seed: 10
  val_freq: !!float 1.5e4
  # val_freq: 500

#### logger
logger:
  print_freq: 100
  # print_freq: 1
  save_checkpoint_freq: !!float 1.5e4