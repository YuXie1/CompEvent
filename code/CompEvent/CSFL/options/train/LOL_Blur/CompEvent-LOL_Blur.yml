name: CompEvent_LOL_Blur
model_type: LOLBlurModel
num_gpu: 4
manual_seed: 100

datasets:
  train:
    name: LOL_Blur-train
    type: LOLBlurTrainVideoDataset
    num_train_video_frames: 3
    dataroot: /data/Clivia/LOL_Blur/test
    crop_size: 128
    use_flip: true  
    bins: 16

    io_backend:
      type: disk
      
    use_shuffle: true
    num_worker_per_gpu: 2
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 2
    prefetch_mode: cpu
    num_prefetch_queue: 2

    mean: ~
    std: ~
    norm_voxel: true

  val:
    name: LOL_Blur-test
    type: LOLBlurTrainVideoDataset
    num_train_video_frames: 3
    dataroot: /data/Clivia/LOL_Blur/test
    crop_size: 128

    io_backend:
      type: disk
      
    mean: ~ 
    std: ~ 
    norm_voxel: true

    val_num_images: 100

network_g:
  type: CompEvent_l

path:
  root: /output/experiments/LOL_Blur/CompEvent
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  total_iter: 200000
  warmup_iter: -1
  use_grad_clip: true
  use_amp: false

  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [61333, 138667]       
    restart_weights: [1,1]
    eta_mins: [0.00001,0.000001]   

  optim_g:
    type: AdamW
    lr: !!float 5e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
  
  pixel_opt:
    # type: L1Loss
    # loss_weight: 1
    # reduction: mean
    type: CharbonnierLoss
    loss_weight: 1.0
    reduction: mean


#   lpips_opt:
#     type: LPIPSLoss
#     loss_weight: 1.0
#     net: vgg
#     reduction: mean

#   freq_opt:
#     type: FreqLoss
#     loss_weight: 0.5
#     reduction: mean

#   edge_opt:
#     type: EventEdgeLoss
#     loss_weight: 0.5
#     reduction: mean
#     threshold: 0

#   lambda_rec: 1.0
#   lambda_lpips: 1.0
#   lambda_freq: 0.5
#   lambda_edge: 0.5

val:
  val_freq: !!float 2e3
  save_img: false
  crop_border: 0
  save_freq: 2e3
  test_y_channel: false

  metrics:
    psnr:
      type: calculate_psnr
    ssim:
      type: calculate_ssim

logger:
  print_freq: 100
  save_checkpoint_freq: !!float 2e3
  use_tb_logger: true
  swanlab:
    project: "CompEvent-LOL_Blur"

dist_params:
  backend: nccl
  port: 29500
  find_unused_parameters: false 